<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIMP — Marine Intelligent Monitoring Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean-deep: #0a1628;
    --ocean-mid: #0d2847;
    --ocean-surface: #0e3d6b;
    --wave-1: #1565c0;
    --wave-2: #1976d2;
    --wave-3: #42a5f5;
    --wave-light: #90caf9;
    --foam: #e3f2fd;
    --accent-cyan: #00e5ff;
    --accent-teal: #00bcd4;
    --accent-green: #00e676;
    --accent-amber: #ffc107;
    --accent-red: #ff1744;
    --glass-bg: rgba(13, 40, 71, 0.7);
    --glass-border: rgba(66, 165, 245, 0.25);
    --text-primary: #e3f2fd;
    --text-secondary: rgba(144, 202, 249, 0.75);
    --text-dim: rgba(144, 202, 249, 0.45);
    --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(66,165,245,0.15);
    --glow-cyan: 0 0 20px rgba(0, 229, 255, 0.4);
    --glow-red: 0 0 20px rgba(255, 23, 68, 0.5);
    --radius: 16px;
    --radius-sm: 8px;
    --font-head: 'Orbitron', monospace;
    --font-body: 'Exo 2', sans-serif;
  }

  [data-theme="light"] {
    --ocean-deep: #e8f4fd;
    --ocean-mid: #dceefb;
    --ocean-surface: #b3d9f5;
    --wave-1: #1565c0;
    --wave-2: #1976d2;
    --wave-3: #42a5f5;
    --wave-light: #1565c0;
    --foam: #0d2847;
    --accent-cyan: #0077b6;
    --accent-teal: #0096c7;
    --glass-bg: rgba(255,255,255,0.75);
    --glass-border: rgba(21, 101, 192, 0.2);
    --text-primary: #0a1628;
    --text-secondary: rgba(13, 40, 71, 0.75);
    --text-dim: rgba(13, 40, 71, 0.45);
    --card-shadow: 0 8px 32px rgba(13,40,71,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--ocean-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }

  /* ─── ANIMATED OCEAN BG ─── */
  .ocean-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .ocean-bg::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(21,101,192,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0,229,255,0.08) 0%, transparent 40%),
      radial-gradient(ellipse at 60% 80%, rgba(13,61,107,0.3) 0%, transparent 50%);
    animation: oceanPulse 8s ease-in-out infinite alternate;
  }
  @keyframes oceanPulse {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }
  .wave-line {
    position: absolute; width: 200%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.15), rgba(0,229,255,0.3), rgba(0,229,255,0.15), transparent);
    animation: waveSweep 6s linear infinite;
  }
  .wave-line:nth-child(2) { top: 30%; animation-delay: -2s; opacity: 0.5; }
  .wave-line:nth-child(3) { top: 60%; animation-delay: -4s; opacity: 0.3; }
  @keyframes waveSweep { from { transform: translateX(-50%); } to { transform: translateX(0%); } }

  /* ─── SCREENS ─── */
  .screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* ─── LOGIN SCREEN ─── */
  #loginScreen {
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #020d1f 0%, #0a1e3a 40%, #0d2d55 100%);
  }

  .login-container {
    width: 440px;
    background: rgba(13,40,71,0.85);
    backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 48px 44px;
    box-shadow: var(--card-shadow), 0 0 80px rgba(0,229,255,0.05);
    position: relative;
  }
  .login-container::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
  }

  .login-brand {
    text-align: center; margin-bottom: 36px;
  }
  .login-brand .logo-icon {
    width: 72px; height: 72px; margin: 0 auto 16px;
    background: linear-gradient(135deg, #1565c0, #00e5ff);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(0,229,255,0.3); }
    50% { box-shadow: 0 0 50px rgba(0,229,255,0.6); }
  }
  .login-brand h1 {
    font-family: var(--font-head);
    font-size: 22px; font-weight: 700;
    color: var(--accent-cyan);
    letter-spacing: 3px;
    line-height: 1.3;
  }
  .login-brand p {
    font-size: 12px; color: var(--text-secondary);
    letter-spacing: 2px; margin-top: 6px;
  }

  .role-selector {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 28px;
  }
  .role-btn {
    padding: 14px 12px;
    background: rgba(21,101,192,0.15);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-align: center;
    transition: all 0.3s;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }
  .role-btn:hover { border-color: var(--accent-cyan); color: var(--text-primary); }
  .role-btn.active {
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(21,101,192,0.3));
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    box-shadow: 0 0 20px rgba(0,229,255,0.15);
  }
  .role-btn .role-icon { font-size: 24px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 2px; color: var(--text-secondary);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .form-group input {
    width: 100%; padding: 13px 16px;
    background: rgba(10,22,40,0.8);
    border: 1px solid rgba(66,165,245,0.2);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: var(--font-body); font-size: 14px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-group input:focus {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 15px rgba(0,229,255,0.15);
  }
  .form-group input::placeholder { color: var(--text-dim); }

  .login-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #1565c0, #00bcd4);
    border: none; border-radius: var(--radius-sm);
    color: white;
    font-family: var(--font-head);
    font-size: 14px; font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .login-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .login-btn:hover { box-shadow: 0 0 30px rgba(0,188,212,0.5); transform: translateY(-1px); }
  .login-btn:hover::after { transform: translateX(100%); }

  /* ─── MAIN APP LAYOUT ─── */
  #appScreen { flex-direction: column; }

  .topnav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8, 20, 40, 0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    padding: 0 28px;
    display: flex; align-items: center; gap: 24px;
    height: 64px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .nav-brand {
    font-family: var(--font-head);
    font-size: 15px; font-weight: 700;
    color: var(--accent-cyan);
    letter-spacing: 2px;
    white-space: nowrap;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-brand .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #1565c0, #00e5ff);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .nav-links {
    display: flex; gap: 4px; margin-left: 16px;
  }
  .nav-link {
    padding: 8px 16px; border-radius: 8px;
    color: var(--text-secondary);
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: transparent;
    font-family: var(--font-body);
    letter-spacing: 0.5px;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 7px;
    position: relative;
  }
  .nav-link:hover { color: var(--text-primary); background: rgba(66,165,245,0.1); }
  .nav-link.active {
    color: var(--accent-cyan);
    background: rgba(0,229,255,0.08);
  }
  .nav-link .badge {
    background: var(--accent-red);
    color: white;
    font-size: 10px; font-weight: 700;
    min-width: 18px; height: 18px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 5px;
    animation: badgePulse 2s infinite;
  }
  @keyframes badgePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .nav-spacer { flex: 1; }
  .nav-actions { display: flex; align-items: center; gap: 12px; }
  .theme-toggle {
    background: rgba(21,101,192,0.2);
    border: 1px solid var(--glass-border);
    color: var(--text-secondary);
    padding: 8px 12px; border-radius: 8px;
    cursor: pointer; font-size: 16px;
    transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

  .user-pill {
    display: flex; align-items: center; gap: 10px;
    background: rgba(21,101,192,0.15);
    border: 1px solid var(--glass-border);
    border-radius: 24px; padding: 6px 14px 6px 8px;
  }
  .user-avatar {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #1565c0, #00bcd4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .user-info .user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .user-info .user-role { font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; }
  .logout-btn {
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    font-size: 14px; padding: 4px;
    transition: color 0.2s;
  }
  .logout-btn:hover { color: var(--accent-red); }

  /* ─── MAIN CONTENT AREA ─── */
  .app-main {
    flex: 1; padding: 24px 28px;
    display: flex; flex-direction: column; gap: 20px;
    max-width: 1800px; width: 100%; margin: 0 auto;
  }

  /* ─── PAGE SECTIONS ─── */
  .page-section { display: none; }
  .page-section.active { display: block; animation: fadeInUp 0.4s ease; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── GLASS CARD ─── */
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .glass-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(66,165,245,0.3), transparent);
  }
  .card-title {
    font-family: var(--font-head);
    font-size: 12px; font-weight: 600;
    letter-spacing: 2.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-cyan);
    box-shadow: 0 0 8px var(--accent-cyan);
  }

  /* ─── MAP ─── */
  .map-container {
    position: relative;
    background: linear-gradient(160deg, #020d1f 0%, #051a35 40%, #071e3d 100%);
    border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--glass-border);
  }
  .map-canvas { width: 100%; display: block; cursor: crosshair; }
  .map-overlay {
    position: absolute; top: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .map-btn {
    width: 36px; height: 36px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--text-secondary);
    transition: all 0.2s;
  }
  .map-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

  .map-legend {
    position: absolute; bottom: 12px; left: 12px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex; gap: 16px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-secondary);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ─── STATS ROW ─── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
  }
  .stat-card {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--card-shadow);
    position: relative; overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .stat-card:hover { border-color: rgba(0,229,255,0.4); }
  .stat-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--accent-color, var(--accent-cyan));
    opacity: 0.5;
  }
  .stat-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-secondary); margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--font-head);
    font-size: 28px; font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
  }
  .stat-unit { font-size: 13px; font-weight: 400; color: var(--text-secondary); margin-left: 4px; }
  .stat-icon {
    position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%);
    font-size: 32px; opacity: 0.12;
  }
  .stat-trend {
    font-size: 11px; margin-top: 6px;
    display: flex; align-items: center; gap: 4px;
  }

  /* ─── STATUS BADGE ─── */
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .status-badge .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%;
    animation: statusPulse 2s infinite;
  }
  @keyframes statusPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .status-normal { background: rgba(0,230,118,0.12); color: var(--accent-green); border: 1px solid rgba(0,230,118,0.3); }
  .status-normal .pulse-dot { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
  .status-risk { background: rgba(255,193,7,0.12); color: var(--accent-amber); border: 1px solid rgba(255,193,7,0.3); }
  .status-risk .pulse-dot { background: var(--accent-amber); box-shadow: 0 0 6px var(--accent-amber); }
  .status-emergency { background: rgba(255,23,68,0.15); color: var(--accent-red); border: 1px solid rgba(255,23,68,0.4); animation: emergencyFlash 1s infinite; }
  .status-emergency .pulse-dot { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }
  @keyframes emergencyFlash { 0%, 100% { box-shadow: var(--glow-red); } 50% { box-shadow: none; } }

  /* ─── HELP BUTTON ─── */
  .help-btn-wrap { display: flex; justify-content: center; padding: 16px 0; }
  .help-btn {
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(255,23,68,0.2), rgba(255,23,68,0.05));
    border: 3px solid rgba(255,23,68,0.5);
    border-radius: 50%;
    cursor: pointer;
    font-family: var(--font-head);
    font-size: 20px; font-weight: 900;
    color: var(--accent-red);
    letter-spacing: 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    transition: all 0.3s;
    position: relative;
    box-shadow: 0 0 40px rgba(255,23,68,0.1);
  }
  .help-btn::before {
    content: '';
    position: absolute; inset: -8px;
    border: 1px solid rgba(255,23,68,0.2);
    border-radius: 50%;
    animation: sonarRing 2s ease-out infinite;
  }
  .help-btn::after {
    content: '';
    position: absolute; inset: -18px;
    border: 1px solid rgba(255,23,68,0.1);
    border-radius: 50%;
    animation: sonarRing 2s ease-out infinite 0.4s;
  }
  @keyframes sonarRing {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.2); opacity: 0; }
  }
  .help-btn:hover {
    background: radial-gradient(circle, rgba(255,23,68,0.35), rgba(255,23,68,0.1));
    border-color: var(--accent-red);
    box-shadow: 0 0 60px rgba(255,23,68,0.4);
    transform: scale(1.05);
  }
  .help-btn.activated {
    background: radial-gradient(circle, rgba(255,23,68,0.5), rgba(255,23,68,0.2));
    border-color: var(--accent-red);
    box-shadow: 0 0 80px rgba(255,23,68,0.6);
    animation: emergencyActivated 0.5s ease;
  }
  @keyframes emergencyActivated {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1.05); }
  }
  .help-btn .help-icon { font-size: 36px; }

  /* ─── SHIPS TABLE ─── */
  .ships-table { width: 100%; border-collapse: collapse; }
  .ships-table th {
    font-size: 10px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-secondary);
    padding: 12px 16px; text-align: left;
    border-bottom: 1px solid var(--glass-border);
  }
  .ships-table td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }
  .ships-table tr:not(:last-child) td { border-bottom: 1px solid rgba(66,165,245,0.08); }
  .ships-table tbody tr {
    cursor: pointer; transition: background 0.2s;
  }
  .ships-table tbody tr:hover { background: rgba(66,165,245,0.06); }
  .ships-table tbody tr.selected { background: rgba(0,229,255,0.08); }

  .ship-name-cell { display: flex; align-items: center; gap: 10px; }
  .ship-icon-cell {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  /* ─── ALERT ITEMS ─── */
  .alert-list { display: flex; flex-direction: column; gap: 10px; }
  .alert-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    background: rgba(10,22,40,0.5);
    border-radius: var(--radius-sm);
    border-left: 3px solid;
    animation: slideInLeft 0.4s ease;
    position: relative;
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .alert-item.emergency { border-color: var(--accent-red); background: rgba(255,23,68,0.05); }
  .alert-item.risk { border-color: var(--accent-amber); background: rgba(255,193,7,0.05); }
  .alert-item.info { border-color: var(--accent-cyan); background: rgba(0,229,255,0.05); }
  .alert-icon { font-size: 22px; flex-shrink: 0; }
  .alert-body .alert-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .alert-body .alert-desc { font-size: 12px; color: var(--text-secondary); }
  .alert-body .alert-time { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
  .alert-new {
    position: absolute; top: 8px; right: 10px;
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    background: var(--accent-red); color: white;
    padding: 2px 7px; border-radius: 4px;
  }

  /* ─── TOAST ─── */
  .toast-container {
    position: fixed; top: 80px; right: 24px;
    z-index: 999;
    display: flex; flex-direction: column; gap: 10px;
  }
  .toast {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-left: 4px solid var(--accent-cyan);
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 300px; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: flex; align-items: flex-start; gap: 12px;
    animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .toast.emergency { border-left-color: var(--accent-red); }
  .toast.warning { border-left-color: var(--accent-amber); }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(80px) scale(0.9); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); max-height: 100px; }
    to { opacity: 0; transform: translateX(80px); max-height: 0; padding: 0; margin: 0; }
  }
  .toast.removing { animation: toastOut 0.3s ease forwards; }
  .toast-icon { font-size: 22px; flex-shrink: 0; }
  .toast-body .toast-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .toast-body .toast-desc { font-size: 12px; color: var(--text-secondary); }

  /* ─── DASHBOARD GRID LAYOUTS ─── */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-items: start;
  }
  .dashboard-grid-left { display: flex; flex-direction: column; gap: 20px; }
  .dashboard-grid-right { display: flex; flex-direction: column; gap: 20px; }

  .admin-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
    align-items: start;
  }
  .admin-left { display: flex; flex-direction: column; gap: 16px; }
  .admin-main { display: flex; flex-direction: column; gap: 20px; }

  /* ─── SHIP LIST ITEM ─── */
  .ship-list-item {
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer; border: 1px solid transparent;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.2s;
    position: relative;
  }
  .ship-list-item:hover { background: rgba(66,165,245,0.08); border-color: var(--glass-border); }
  .ship-list-item.active { background: rgba(0,229,255,0.06); border-color: rgba(0,229,255,0.3); }
  .ship-list-icon { font-size: 20px; }
  .ship-list-info { flex: 1; }
  .ship-list-name { font-size: 13px; font-weight: 600; }
  .ship-list-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .ship-list-status { flex-shrink: 0; }

  /* ─── SPEED CHART ─── */
  .mini-chart { height: 60px; position: relative; overflow: hidden; }
  .chart-canvas { width: 100%; height: 100%; }

  /* ─── COORD DISPLAY ─── */
  .coord-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .coord-item {
    background: rgba(10,22,40,0.5);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 1px solid rgba(66,165,245,0.1);
  }
  .coord-label { font-size: 10px; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 4px; }
  .coord-val { font-family: var(--font-head); font-size: 14px; color: var(--accent-cyan); }

  /* ─── SIMULATE BUTTON ─── */
  .simulate-btn {
    width: 100%;
    padding: 12px 20px;
    background: linear-gradient(135deg, rgba(255,193,7,0.15), rgba(255,152,0,0.1));
    border: 1px solid rgba(255,193,7,0.4);
    border-radius: var(--radius-sm);
    color: var(--accent-amber);
    font-family: var(--font-head);
    font-size: 11px; font-weight: 600;
    letter-spacing: 2.5px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .simulate-btn:hover { background: linear-gradient(135deg, rgba(255,193,7,0.25), rgba(255,152,0,0.2)); box-shadow: 0 0 20px rgba(255,193,7,0.2); }

  /* ─── ROUTE HISTORY ─── */
  .route-timeline { display: flex; flex-direction: column; gap: 0; position: relative; }
  .route-timeline::before {
    content: ''; position: absolute;
    left: 14px; top: 8px; bottom: 8px; width: 1px;
    background: linear-gradient(to bottom, var(--accent-cyan), transparent);
  }
  .route-point {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 8px 0;
    position: relative;
  }
  .route-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    margin-top: 3px; position: relative; z-index: 1;
  }
  .route-point-info .route-time { font-size: 11px; color: var(--text-secondary); }
  .route-point-info .route-coords { font-family: var(--font-head); font-size: 11px; color: var(--text-primary); }

  /* ─── HEATMAP ─── */
  .heatmap-canvas { width: 100%; border-radius: var(--radius-sm); }

  /* ─── PAGE HEADER ─── */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-header h2 {
    font-family: var(--font-head);
    font-size: 18px; font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 2px;
  }
  .page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(10,22,40,0.5); }
  ::-webkit-scrollbar-thumb { background: rgba(66,165,245,0.3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,229,255,0.5); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1100px) {
    .dashboard-grid { grid-template-columns: 1fr; }
    .admin-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .app-main { padding: 16px; }
    .topnav { padding: 0 16px; }
    .nav-links .nav-link span { display: none; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  /* ─── SPINNER ─── */
  .connecting {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--accent-cyan); letter-spacing: 1px;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,229,255,0.2);
    border-top-color: var(--accent-cyan);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── NOTIFICATION DOT ─── */
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-red);
    box-shadow: 0 0 8px var(--accent-red);
    animation: badgePulse 1.5s infinite;
  }

  .section-divider { height: 1px; background: var(--glass-border); margin: 4px 0; }

  .compass-display {
    width: 80px; height: 80px; margin: 0 auto;
    position: relative;
  }
  .compass-circle {
    width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid var(--glass-border);
    background: rgba(10,22,40,0.6);
    position: relative; overflow: hidden;
  }
  .compass-needle {
    position: absolute; top: 50%; left: 50%;
    width: 3px; height: 28px;
    background: linear-gradient(to bottom, var(--accent-red), var(--accent-cyan));
    transform-origin: 50% 100%;
    margin-left: -1.5px; margin-top: -28px;
    border-radius: 2px 2px 0 0;
    transition: transform 1s ease;
  }
  .compass-center {
    position: absolute; top: 50%; left: 50%;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-cyan);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px var(--accent-cyan);
  }
  .compass-labels {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  }
  .compass-label {
    position: absolute;
    font-family: var(--font-head); font-size: 9px; font-weight: 600;
    color: var(--text-secondary);
  }
  .compass-label.n { top: 4px; left: 50%; transform: translateX(-50%); }
  .compass-label.s { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .compass-label.e { right: 6px; top: 50%; transform: translateY(-50%); }
  .compass-label.w { left: 6px; top: 50%; transform: translateY(-50%); }

  /* Speed gauge */
  .gauge-container { position: relative; width: 120px; height: 70px; margin: 0 auto; overflow: hidden; }
  .gauge-arc { }
  .gauge-needle {
    position: absolute; bottom: 0; left: 50%;
    width: 3px; height: 55px;
    background: linear-gradient(to top, var(--accent-cyan), transparent);
    transform-origin: 50% 100%;
    transform: translateX(-50%) rotate(-90deg);
    transition: transform 1s ease;
    border-radius: 2px;
  }
  .gauge-val {
    position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    font-family: var(--font-head); font-size: 18px; font-weight: 700;
    color: var(--text-primary); white-space: nowrap;
  }

  .close-panel-btn {
    background: none; border: none;
    color: var(--text-dim); cursor: pointer; font-size: 18px;
    margin-left: auto; padding: 4px;
    transition: color 0.2s;
  }
  .close-panel-btn:hover { color: var(--accent-red); }

  .detail-panel {
    border: 1px solid rgba(0,229,255,0.2);
    box-shadow: 0 0 30px rgba(0,229,255,0.06);
  }
</style>
</head>
<body>

<!-- Ocean BG -->
<div class="ocean-bg">
  <div class="wave-line"></div>
  <div class="wave-line"></div>
  <div class="wave-line"></div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════ -->
<div class="screen active" id="loginScreen">
  <div class="login-container">
    <div class="login-brand">
      <div class="logo-icon">🚢</div>
      <h1>MIMP</h1>
      <p>MARINE INTELLIGENT MONITORING PLATFORM</p>
    </div>

    <div class="role-selector">
      <button class="role-btn active" onclick="selectRole('driver', this)">
        <span class="role-icon">⚓</span>
        <span>Ship Driver</span>
      </button>
      <button class="role-btn" onclick="selectRole('admin', this)">
        <span class="role-icon">🛂</span>
        <span>Port Authority</span>
      </button>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="captain@maritime.com" value="captain@maritime.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" value="••••••••">
    </div>

    <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>

    <div style="text-align:center; margin-top:16px;">
      <div class="connecting"><div class="spinner"></div> Secure maritime connection active</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     APP SCREEN
═══════════════════════════════════════ -->
<div class="screen" id="appScreen" style="flex-direction:column;">

  <!-- TOP NAV -->
  <nav class="topnav" id="topNav">
    <div class="nav-brand">
      <div class="brand-icon">🚢</div>
      <span>MIMP</span>
    </div>
    <div class="nav-links" id="navLinks"></div>
    <div class="nav-spacer"></div>
    <div class="nav-actions">
      <div class="connecting" style="font-size:10px; padding: 0 8px;"><div class="spinner"></div> LIVE</div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar">👤</div>
        <div class="user-info">
          <div class="user-name" id="userNameDisplay">—</div>
          <div class="user-role" id="userRoleDisplay">—</div>
        </div>
        <button class="logout-btn" onclick="doLogout()" title="Logout">⏻</button>
      </div>
    </div>
  </nav>

  <!-- MAIN AREA -->
  <div class="app-main" id="appMain"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentRole = 'driver';
let currentNav = 'dashboard';
let darkTheme = true;
let selectedShipId = null;
let emergencyActive = false;
let alertCount = 0;
let simInterval = null;
let mapAnimFrame = null;
let speedChartData = [];
let alerts = [];

const SHIPS = [
  { id: 'SV-001', name: 'Neptune Voyager', icon: '🚢', color: '#00e5ff',
    lat: 37.9, lng: 23.7, speed: 12.4, dir: 45, status: 'normal', fuel: 78 },
  { id: 'SV-002', name: 'Atlas Carrier', icon: '🛳️', color: '#42a5f5',
    lat: 37.5, lng: 24.3, speed: 8.1, dir: 210, status: 'normal', fuel: 55 },
  { id: 'SV-003', name: 'Poseidon Star', icon: '⛴️', color: '#00bcd4',
    lat: 38.2, lng: 23.2, speed: 15.7, dir: 130, status: 'normal', fuel: 90 },
  { id: 'SV-004', name: 'Aegean Spirit', icon: '🚤', color: '#80deea',
    lat: 37.7, lng: 24.8, speed: 6.3, dir: 300, status: 'normal', fuel: 42 },
  { id: 'SV-005', name: 'Triton Express', icon: '⛵', color: '#4dd0e1',
    lat: 38.0, lng: 24.1, speed: 11.2, dir: 75, status: 'normal', fuel: 67 },
];

let myShipId = 'SV-001';

function getMyShip() { return SHIPS.find(s => s.id === myShipId); }
function getShipById(id) { return SHIPS.find(s => s.id === id); }

// Route history for my ship
let routeHistory = [
  { lat: 37.7, lng: 23.5, time: '06:00', speed: 10 },
  { lat: 37.75, lng: 23.55, time: '07:00', speed: 11 },
  { lat: 37.8, lng: 23.6, time: '08:00', speed: 12 },
  { lat: 37.85, lng: 23.65, time: '09:00', speed: 13 },
  { lat: 37.9, lng: 23.7, time: '10:00', speed: 12.4 },
];

// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
function selectRole(role, btn) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function doLogin() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  initApp();
}

function doLogout() {
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  if (simInterval) clearInterval(simInterval);
  if (mapAnimFrame) cancelAnimationFrame(mapAnimFrame);
  emergencyActive = false;
  alerts = [];
  alertCount = 0;
  SHIPS.forEach(s => s.status = 'normal');
}

// ═══════════════════════════════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════════════════════════════
function initApp() {
  // Set user info
  const names = { driver: 'Capt. Ahmed Al-Rashid', admin: 'Ctrl. Sarah Bennett' };
  const roles = { driver: 'SHIP DRIVER', admin: 'PORT AUTHORITY' };
  const avatars = { driver: '⚓', admin: '🛂' };
  document.getElementById('userNameDisplay').textContent = names[currentRole];
  document.getElementById('userRoleDisplay').textContent = roles[currentRole];
  document.getElementById('userAvatar').textContent = avatars[currentRole];

  buildNav();
  navigateTo('dashboard');
  startSimulation();
  addAlert('info', '🟢 System Online', 'Maritime monitoring system connected. All sensors nominal.', true);
}

function buildNav() {
  const links = currentRole === 'driver'
    ? [
        { key: 'dashboard', icon: '🗂️', label: 'Dashboard' },
        { key: 'map', icon: '🗺️', label: 'Live Map' },
        { key: 'history', icon: '📍', label: 'Route History' },
        { key: 'alerts', icon: '🔔', label: 'Alerts' },
      ]
    : [
        { key: 'dashboard', icon: '🗂️', label: 'Dashboard' },
        { key: 'fleet', icon: '🚢', label: 'Fleet' },
        { key: 'map', icon: '🗺️', label: 'Live Map' },
        { key: 'alerts', icon: '🔔', label: 'Alerts' },
      ];

  const nav = document.getElementById('navLinks');
  nav.innerHTML = links.map(l => `
    <button class="nav-link" id="navBtn-${l.key}" onclick="navigateTo('${l.key}')">
      ${l.icon} <span>${l.label}</span>
      ${l.key === 'alerts' ? `<span class="badge" id="alertBadge" style="display:none">0</span>` : ''}
    </button>
  `).join('');
}

function navigateTo(page) {
  currentNav = page;
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`navBtn-${page}`);
  if (btn) btn.classList.add('active');
  renderPage(page);
}

// ═══════════════════════════════════════════════════════════════
// PAGE RENDERER
// ═══════════════════════════════════════════════════════════════
function renderPage(page) {
  const main = document.getElementById('appMain');
  main.innerHTML = '';

  if (currentRole === 'driver') {
    switch (page) {
      case 'dashboard': renderDriverDashboard(main); break;
      case 'map': renderDriverMap(main); break;
      case 'history': renderRouteHistory(main); break;
      case 'alerts': renderAlertsPage(main); break;
    }
  } else {
    switch (page) {
      case 'dashboard': renderAdminDashboard(main); break;
      case 'fleet': renderFleetPage(main); break;
      case 'map': renderAdminMap(main); break;
      case 'alerts': renderAlertsPage(main); break;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// DRIVER DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDriverDashboard(container) {
  const ship = getMyShip();
  container.innerHTML = `
    <div class="page-header">
      <div>
        <h2>SHIP DASHBOARD</h2>
        <p>Real-time monitoring for ${ship.name} · ${ship.id}</p>
      </div>
      <div class="status-badge ${statusClass(ship.status)}">
        <div class="pulse-dot"></div>
        ${ship.status.toUpperCase()}
      </div>
    </div>

    <div class="stats-row" id="driverStats"></div>

    <div class="dashboard-grid">
      <div class="dashboard-grid-left">
        <div class="glass-card">
          <div class="card-title"><div class="dot"></div> LIVE POSITION MAP</div>
          <div class="map-container">
            <canvas class="map-canvas" id="driverMapCanvas" height="380"></canvas>
            <div class="map-overlay">
              <div class="map-btn" title="Zoom In">+</div>
              <div class="map-btn" title="Zoom Out">−</div>
            </div>
            <div class="map-legend">
              <div class="legend-item"><div class="legend-dot" style="background:#00e5ff"></div>My Ship</div>
              <div class="legend-item"><div class="legend-dot" style="background:#42a5f5;opacity:.6"></div>Other Ships</div>
              <div class="legend-item"><div class="legend-dot" style="background:#00e676"></div>Port</div>
            </div>
          </div>
        </div>

        <div class="glass-card">
          <div class="card-title"><div class="dot"></div> SPEED ANALYTICS</div>
          <canvas id="speedChart" height="80"></canvas>
        </div>
      </div>

      <div class="dashboard-grid-right">
        <div class="glass-card">
          <div class="card-title"><div class="dot"></div> SHIP COMPASS</div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
            <div class="compass-display">
              <div class="compass-circle" id="compassCircle">
                <div class="compass-needle" id="compassNeedle"></div>
                <div class="compass-center"></div>
              </div>
              <div class="compass-labels">
                <div class="compass-label n">N</div>
                <div class="compass-label s">S</div>
                <div class="compass-label e">E</div>
                <div class="compass-label w">W</div>
              </div>
            </div>
            <div style="font-family:var(--font-head);font-size:22px;color:var(--accent-cyan)" id="compassDegLabel">${ship.dir}°</div>
          </div>
        </div>

        <div class="glass-card">
          <div class="card-title"><div class="dot"></div> COORDINATES</div>
          <div class="coord-grid">
            <div class="coord-item">
              <div class="coord-label">LATITUDE</div>
              <div class="coord-val" id="latDisplay">${ship.lat.toFixed(4)}°N</div>
            </div>
            <div class="coord-item">
              <div class="coord-label">LONGITUDE</div>
              <div class="coord-val" id="lngDisplay">${ship.lng.toFixed(4)}°E</div>
            </div>
          </div>
        </div>

        <div class="glass-card">
          <div class="card-title"><div class="dot" style="background:var(--accent-red);box-shadow:0 0 8px var(--accent-red)"></div> EMERGENCY SOS</div>
          <div class="help-btn-wrap">
            <button class="help-btn ${emergencyActive ? 'activated' : ''}" id="helpBtn" onclick="triggerEmergency()">
              <span class="help-icon">🆘</span>
              <span>HELP</span>
            </button>
          </div>
          <div style="text-align:center; font-size:11px; color:var(--text-secondary); margin-top:8px;">
            Press in case of emergency · Alerts port authority
          </div>
        </div>

        <div class="glass-card">
          <div class="card-title"><div class="dot"></div> RECENT ALERTS</div>
          <div id="miniAlerts" style="max-height:160px;overflow-y:auto">
            ${renderMiniAlerts()}
          </div>
        </div>
      </div>
    </div>
  `;

  updateDriverStats();
  updateCompass(ship.dir);
  drawDriverMap();
  drawSpeedChart();
}

function updateDriverStats() {
  const ship = getMyShip();
  const el = document.getElementById('driverStats');
  if (!el) return;
  const statusColors = { normal: '#00e676', risk: '#ffc107', emergency: '#ff1744' };
  el.innerHTML = `
    <div class="stat-card" style="--accent-color:${statusColors[ship.status]}">
      <div class="stat-label">Speed</div>
      <div class="stat-value">${ship.speed.toFixed(1)}<span class="stat-unit">kts</span></div>
      <div class="stat-trend" style="color:var(--accent-green)">▲ On course</div>
      <div class="stat-icon">⚡</div>

// ═══════════════════════════════════════════════════════════════
// MAP DRAWING
// ═══════════════════════════════════════════════════════════════
let mapOffset = { x: 0, y: 0 };
let mapZoom = 1;

function geoToCanvas(lat, lng, canvas) {
  // Map bounds: lat 36.5-39, lng 22.5-26
  const minLat = 36.5, maxLat = 39.5, minLng = 22, maxLng = 27;
  const x = ((lng - minLng) / (maxLng - minLng)) * canvas.width;
  const y = canvas.height - ((lat - minLat) / (maxLat - minLat)) * canvas.height;
  return { x, y };
}

function drawMap(canvas, showRoute, highlightId) {
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 800;

  // Background — ocean
  const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  grad.addColorStop(0, '#020d1f');
  grad.addColorStop(0.5, '#051a35');
  grad.addColorStop(1, '#071e3d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(66,165,245,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.width; i += 60) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
  }
  for (let j = 0; j < canvas.height; j += 60) {
    ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
  }

  // Coastline (simplified polygon for Aegean)
  ctx.beginPath();
  ctx.fillStyle = 'rgba(21,101,192,0.18)';
  ctx.strokeStyle = 'rgba(66,165,245,0.3)';
  ctx.lineWidth = 1.5;
  const coastPoints = [
    [39.5, 22], [39.5, 22.8], [39.0, 22.5], [38.7, 22.0], [38.3, 22.2],
    [37.9, 22.0], [37.5, 22.5], [37.2, 22.3], [37.0, 22.8], [36.8, 23.0],
    [36.5, 22.5], [36.5, 22],
  ];
  coastPoints.forEach(([lat, lng], i) => {
    const p = geoToCanvas(lat, lng, canvas);
    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  });
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Port marker
  const portPos = geoToCanvas(37.94, 23.72, canvas);
  ctx.beginPath();
  ctx.arc(portPos.x, portPos.y, 8, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,230,118,0.3)';
  ctx.fill();
  ctx.strokeStyle = '#00e676'; ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#00e676'; ctx.font = '11px Exo 2'; ctx.fillText('⚓ Port', portPos.x + 11, portPos.y + 4);

  // Route history
  if (showRoute && routeHistory.length > 1) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(0,229,255,0.35)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    routeHistory.forEach((pt, i) => {
      const p = geoToCanvas(pt.lat, pt.lng, canvas);
      if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Ships
  SHIPS.forEach(ship => {
    const pos = geoToCanvas(ship.lat, ship.lng, canvas);
    const isMe = ship.id === myShipId;
    const isHighlight = ship.id === highlightId;
    const r = isMe ? 10 : 7;

    // Glow
    const glowColor = ship.status === 'emergency' ? 'rgba(255,23,68,0.4)' :
                      ship.status === 'risk' ? 'rgba(255,193,7,0.3)' :
                      isMe ? 'rgba(0,229,255,0.3)' : `${ship.color}33`;
    const glowGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r * 3);
    glowGrad.addColorStop(0, glowColor);
    glowGrad.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(pos.x, pos.y, r * 3, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad; ctx.fill();

    // Ship circle
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.fillStyle = ship.status === 'emergency' ? '#ff1744' :
                    ship.status === 'risk' ? '#ffc107' : ship.color;
    ctx.fill();
    if (isMe || isHighlight) {
      ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
    }

    // Direction arrow
    const rad = (ship.dir - 90) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(pos.x + Math.cos(rad) * (r + 2), pos.y + Math.sin(rad) * (r + 2));
    ctx.lineTo(pos.x + Math.cos(rad) * (r + 10), pos.y + Math.sin(rad) * (r + 10));
    ctx.strokeStyle = isMe ? '#fff' : `${ship.color}cc`;
    ctx.lineWidth = 2; ctx.stroke();

    // Label
    ctx.fillStyle = isMe ? '#e3f2fd' : 'rgba(144,202,249,0.7)';
    ctx.font = isMe ? 'bold 11px Exo 2' : '10px Exo 2';
    ctx.fillText(ship.id, pos.x + r + 4, pos.y - r - 2);
    ctx.font = '10px Exo 2'; ctx.fillStyle = 'rgba(144,202,249,0.5)';
    ctx.fillText(`${ship.speed.toFixed(1)}kts`, pos.x + r + 4, pos.y + 3);

    // Emergency sonar rings
    if (ship.status === 'emergency') {
      const t = (Date.now() % 2000) / 2000;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + t * 30, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,23,68,${0.6 - t * 0.6})`;
      ctx.lineWidth = 1.5; ctx.stroke();
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// SPEED CHART
// ═══════════════════════════════════════════════════════════════
function drawSpeedChart() {
  const canvas = document.getElementById('speedChart');
  if (!canvas) return;
  canvas.width = canvas.offsetWidth || 600;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Data
  if (speedChartData.length > 40) speedChartData.shift();

  ctx.clearRect(0, 0, w, h);

  // Area gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(0,229,255,0.25)');
  grad.addColorStop(1, 'rgba(0,229,255,0)');

  if (speedChartData.length > 1) {
    ctx.beginPath();
    speedChartData.forEach((v, i) => {
      const x = (i / (speedChartData.length - 1)) * w;
      const y = h - (v / 25) * h;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    ctx.beginPath();
    speedChartData.forEach((v, i) => {
      const x = (i / (speedChartData.length - 1)) * w;
      const y = h - (v / 25) * h;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2;
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 6;
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  // Labels
  ctx.fillStyle = 'rgba(144,202,249,0.5)'; ctx.font = '10px Exo 2';
  ctx.fillText('Speed (kts)', 4, 12);
  if (speedChartData.length) {
    ctx.fillStyle = '#00e5ff';
    ctx.fillText(`${speedChartData[speedChartData.length-1].toFixed(1)} kts`, w - 60, 12);
  }
}

function triggerEmergency() {
  if (emergencyActive) {
    emergencyActive = false;
    const ship = getMyShip();
    ship.status = 'normal';
    document.getElementById('helpBtn').classList.remove('activated');
    showToast('info', '✅ Emergency Cancelled', 'Emergency signal has been cancelled.', false);
    addAlert('info', '✅ Emergency Cancelled', `${ship.name} emergency signal deactivated.`, false);
  } else {
    emergencyActive = true;
    const ship = getMyShip();
    ship.status = 'emergency';
    document.getElementById('helpBtn').classList.add('activated');
    playAlertSound();
    showToast('emergency', '🆘 EMERGENCY ACTIVATED', `${ship.name} has triggered emergency signal!`, true);
    addAlert('emergency', '🆘 SOS SIGNAL SENT', `${ship.name} (${ship.id}) has activated emergency beacon. Immediate assistance required!`, true);
    updateDriverStats();
  }
}

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.5);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.6);
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// SIMULATION
// ═══════════════════════════════════════════════════════════════
function startSimulation() {
  simInterval = setInterval(() => {
    SHIPS.forEach(ship => {
      // Move ships
      const rad = ship.dir * Math.PI / 180;
      const speed = ship.speed / 3600 / 60; // degrees per interval
      ship.lat += Math.cos(rad) * speed * 0.8;
      ship.lng += Math.sin(rad) * speed * 0.8;

      // Slight course variation
      ship.dir += (Math.random() - 0.5) * 2;
      ship.speed += (Math.random() - 0.5) * 0.3;
      ship.speed = Math.max(3, Math.min(22, ship.speed));

      // Boundary bounce
      if (ship.lat > 39 || ship.lat < 37) ship.dir = 360 - ship.dir;
      if (ship.lng > 26 || ship.lng < 22.5) ship.dir = (180 - ship.dir + 360) % 360;

      // Update route history for my ship
      if (ship.id === myShipId) {
        speedChartData.push(ship.speed);
        const coordEl = document.getElementById('latDisplay');
        if (coordEl) {
          document.getElementById('latDisplay').textContent = `${ship.lat.toFixed(4)}°N`;
          document.getElementById('lngDisplay').textContent = `${ship.lng.toFixed(4)}°E`;
        }
        updateCompass(ship.dir);
        updateDriverStats();
      }
    });

    // Collision detection
    checkCollisions();

    // Update ship list if on fleet page
    if (currentRole === 'admin' && currentNav === 'fleet') {
      updateShipListStatus();
    }
    if (currentRole === 'admin' && currentNav === 'dashboard') {
      updateAdminStats();
    }
  }, 1500);
}

function checkCollisions() {
  for (let i = 0; i < SHIPS.length; i++) {
    for (let j = i + 1; j < SHIPS.length; j++) {
      const a = SHIPS[i], b = SHIPS[j];
      const dist = Math.sqrt((a.lat - b.lat)**2 + (a.lng - b.lng)**2);
      if (dist < 0.12 && a.status !== 'emergency' && b.status !== 'emergency') {
        if (Math.random() < 0.03) {
          a.status = 'risk'; b.status = 'risk';
          addAlert('risk', '⚠️ COLLISION RISK', `${a.name} and ${b.name} are dangerously close (${(dist*111).toFixed(1)}km)`, true);
          showToast('warning', '⚠️ Collision Warning', `${a.id} & ${b.id} proximity alert!`, false);
          setTimeout(() => {
            if (a.status === 'risk') a.status = 'normal';
            if (b.status === 'risk') b.status = 'normal';
          }, 8000);
        }
      }
    }
  }
}

function simulateEvent() {
  const events = [
    () => {
      const ship = SHIPS[Math.floor(Math.random() * SHIPS.length)];
      ship.status = 'emergency';
      addAlert('emergency', `🆘 EMERGENCY: ${ship.name}`, `Emergency beacon activated on ${ship.id}`, true);
      showToast('emergency', `🆘 ${ship.name} SOS`, 'Emergency beacon has been triggered!', true);
      playAlertSound();
      setTimeout(() => { ship.status = 'normal'; }, 10000);
    },
    () => {
      const ship = SHIPS[1];
      const prevSpeed = ship.speed;
      ship.speed = 0.5;
      addAlert('risk', `⛔ Sudden Stop: ${ship.name}`, `Abnormal deceleration detected from ${prevSpeed.toFixed(1)} to 0.5 kts`, true);
      showToast('warning', '⚠️ Abnormal Behavior', `${ship.name} sudden stop detected!`, false);
      setTimeout(() => { ship.speed = prevSpeed; }, 5000);
    },
    () => {
      SHIPS[2].status = 'risk'; SHIPS[3].status = 'risk';
      addAlert('risk', '⚠️ Traffic Congestion', 'High vessel density detected in zone AEG-4', true);
      showToast('warning', '⚠️ Traffic Alert', 'Congestion detected in sector AEG-4', false);
      setTimeout(() => { SHIPS[2].status = 'normal'; SHIPS[3].status = 'normal'; }, 7000);
    }
  ];
  events[Math.floor(Math.random() * events.length)]();
}

// ALERTS SYSTEM
// ═══════════════════════════════════════════════════════════════
function addAlert(type, title, desc, isNew) {
  alerts.unshift({
    type, title, desc, isNew,
    icon: type === 'emergency' ? '🆘' : type === 'risk' ? '⚠️' : '📡',
    time: new Date().toLocaleTimeString(),
    id: Date.now()
  });
  if (alerts.length > 20) alerts.pop();
  if (isNew) {
    alertCount++;
    const badge = document.getElementById('alertBadge');
    if (badge) { badge.textContent = alertCount; badge.style.display = 'flex'; }
  }
  const miniAlerts = document.getElementById('miniAlerts');
  if (miniAlerts) miniAlerts.innerHTML = renderMiniAlerts();
}

function showToast(type, title, desc, persistent) {
  const container = document.getElementById('toastContainer');
  const id = `toast-${Date.now()}`;
  const div = document.createElement('div');
  div.className = `toast ${type}`; div.id = id;
  div.innerHTML = `
    <div class="toast-icon">${type === 'emergency' ? '🆘' : type === 'warning' ? '⚠️' : '📡'}</div>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      <div class="toast-desc">${desc}</div>
    </div>
  `;
  container.appendChild(div);
  if (!persistent) {
    setTimeout(() => {
      div.classList.add('removing');
      setTimeout(() => div.remove(), 300);
    }, 5000);
  } else {
    setTimeout(() => {
      div.classList.add('removing');
      setTimeout(() => div.remove(), 300);
    }, 10000);
  }
}

function updateShipListStatus() {
  // Lightweight update — just refresh if on admin dashboard
  if (currentNav === 'dashboard') {
    updateAdminShipList();
    updateAdminStats();
    const adminAlertsEl = document.getElementById('adminAlerts');
    if (adminAlertsEl) adminAlertsEl.innerHTML = renderAlertList();
  }
}

function renderAlertList() {
  if (alerts.length === 0) return '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:16px">No alerts</div>';
  return alerts.slice(0, 5).map(a => `
    <div class="alert-item ${a.type}">
      <span class="alert-icon">${a.icon}</span>
      <div class="alert-body">
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
        <div class="alert-time">${a.time}</div>
      </div>
      ${a.isNew ? '<span class="alert-new">NEW</span>' : ''}
    </div>
  `).join('');
}

function selectShip(id) {
  selectedShipId = id;
  updateAdminShipList();
  renderShipDetailPanel();
}

function renderShipDetailPanel() {
  const container = document.getElementById('selectedShipDetail');
  if (!container || !selectedShipId) return;
  const ship = getShipById(selectedShipId);
  if (!ship) return;

  container.innerHTML = `
    <div class="glass-card detail-panel">
      <div class="card-title" style="justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="dot"></div> SHIP DETAIL: ${ship.name}
        </div>
        <button class="close-panel-btn" onclick="selectedShipId=null;document.getElementById('selectedShipDetail').innerHTML=''">✕</button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="coord-item">
          <div class="coord-label">SHIP ID</div>
          <div class="coord-val">${ship.id}</div>
        </div>
        <div class="coord-item">
          <div class="coord-label">SPEED</div>
          <div class="coord-val">${ship.speed.toFixed(1)} kts</div>
        </div>
        <div class="coord-item">
          <div class="coord-label">HEADING</div>
          <div class="coord-val">${Math.round(ship.dir)}°</div>
        </div>
        <div class="coord-item">
          <div class="coord-label">LATITUDE</div>
          <div class="coord-val">${ship.lat.toFixed(4)}°N</div>
        </div>
        <div class="coord-item">
          <div class="coord-label">LONGITUDE</div>
          <div class="coord-val">${ship.lng.toFixed(4)}°E</div>
        </div>
        <div class="coord-item">
          <div class="coord-label">STATUS</div>
          <div>
            <span class="status-badge ${statusClass(ship.status)}" style="font-size:10px">
              <div class="pulse-dot"></div>${ship.status.toUpperCase()}
            </span>
          </div>
        </div>
      </div>

      <div class="card-title" style="font-size:10px"><div class="dot"></div> VOYAGE HISTORY</div>
      <div class="route-timeline">
        ${routeHistory.map((pt, i) => `
          <div class="route-point">
            <div class="route-dot" style="background:${i === routeHistory.length-1 ? 'var(--accent-cyan)' : 'var(--text-dim)'}"></div>
            <div class="route-point-info">
              <div class="route-time">${pt.time}</div>
              <div class="route-coords">${pt.lat.toFixed(3)}°N · ${pt.lng.toFixed(3)}°E · ${pt.speed.toFixed(1)} kts</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// FLEET PAGE
// ═══════════════════════════════════════════════════════════════
function renderFleetPage(container) {
  container.innerHTML = `
    <div class="page-header">
      <div>
        <h2>FLEET OVERVIEW</h2>
        <p>${SHIPS.length} vessels under monitoring</p>
      </div>
      <button class="simulate-btn" style="width:auto;padding:10px 20px" onclick="simulateEvent()">
        ⚡ SIMULATE EVENT
      </button>
    </div>

    <div class="glass-card">
      <div class="card-title"><div class="dot"></div> ALL VESSELS</div>
      <table class="ships-table">
        <thead>
          <tr>
            <th>Vessel</th><th>ID</th><th>Speed</th><th>Heading</th>
            <th>Position</th><th>Fuel</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="fleetTableBody">
        </tbody>
      </table>
    </div>

    <div id="fleetShipDetail"></div>
  `;
  renderFleetTable();
}

function renderFleetTable() {
  const tbody = document.getElementById('fleetTableBody');
  if (!tbody) return;
  tbody.innerHTML = SHIPS.map(ship => `
    <tr class="${selectedShipId === ship.id ? 'selected' : ''}" onclick="selectFleetShip('${ship.id}')">
      <td>
        <div class="ship-name-cell">
          <div class="ship-icon-cell" style="background:${ship.color}22">${ship.icon}</div>
          <div>
            <div style="font-weight:600">${ship.name}</div>
          </div>
        </div>
      </td>
      <td><span style="font-family:var(--font-head);font-size:12px;color:var(--accent-cyan)">${ship.id}</span></td>
      <td><span style="font-family:var(--font-head)">${ship.speed.toFixed(1)}</span> kts</td>
      <td>${Math.round(ship.dir)}°</td>
      <td style="font-family:var(--font-head);font-size:11px;color:var(--text-secondary)">
        ${ship.lat.toFixed(3)}°N ${ship.lng.toFixed(3)}°E
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:60px;height:6px;background:rgba(66,165,245,0.15);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${ship.fuel}%;background:${ship.fuel<30?'var(--accent-amber)':'var(--accent-cyan)'};border-radius:3px;transition:width 1s"></div>
          </div>
          <span style="font-size:11px;color:var(--text-secondary)">${ship.fuel}%</span>
        </div>
      </td>
      <td>
        <span class="status-badge ${statusClass(ship.status)}" style="font-size:10px;padding:3px 10px">
          <div class="pulse-dot"></div>${ship.status}
        </span>
      </td>
    </tr>
  `).join('');
}

function selectFleetShip(id) {
  selectedShipId = id;
  renderFleetTable();
  const ship = getShipById(id);
  const container = document.getElementById('fleetShipDetail');
  if (!container || !ship) return;
  container.innerHTML = `
    <div class="glass-card detail-panel" style="margin-top:0">
      <div class="card-title" style="justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="dot"></div> DETAILED VIEW: ${ship.icon} ${ship.name}
        </div>
        <button class="close-panel-btn" onclick="selectedShipId=null;document.getElementById('fleetShipDetail').innerHTML=''">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px">
        <div>
          <div class="map-container" style="margin-bottom:16px">
            <canvas id="shipDetailMap" class="map-canvas" height="220"></canvas>
          </div>
          <div class="route-timeline">
            ${routeHistory.map((pt, i) => `
              <div class="route-point">
                <div class="route-dot" style="background:${i === routeHistory.length-1 ? 'var(--accent-cyan)' : 'rgba(66,165,245,0.4)'}"></div>
                <div class="route-point-info">
                  <div class="route-time">${pt.time}</div>
                  <div class="route-coords">${pt.lat.toFixed(3)}°N · ${pt.lng.toFixed(3)}°E · ${pt.speed.toFixed(1)} kts</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${[
            ['VESSEL', ship.name],
            ['ID', ship.id],
            ['SPEED', `${ship.speed.toFixed(1)} kts`],
            ['HEADING', `${Math.round(ship.dir)}°`],
            ['LATITUDE', `${ship.lat.toFixed(4)}°N`],
            ['LONGITUDE', `${ship.lng.toFixed(4)}°E`],
            ['FUEL', `${ship.fuel}%`],
          ].map(([label, val]) => `
            <div class="coord-item">
              <div class="coord-label">${label}</div>
              <div class="coord-val">${val}</div>
            </div>
          `).join('')}
          <div>
            <div class="coord-label" style="font-size:10px;letter-spacing:2px;color:var(--text-secondary);margin-bottom:8px">STATUS</div>
            <span class="status-badge ${statusClass(ship.status)}">
              <div class="pulse-dot"></div>${ship.status.toUpperCase()}
            </span>
          </div>
        </div>
      </div>
    </div>
  `;
  setTimeout(() => {
    const c = document.getElementById('shipDetailMap');
    if (c) drawMap(c, true, id);
  }, 50);
}

// ═══════════════════════════════════════════════════════════════
// ALERTS PAGE
// ═══════════════════════════════════════════════════════════════
function renderAlertsPage(container) {
  alertCount = 0;
  const badge = document.getElementById('alertBadge');
  if (badge) badge.style.display = 'none';
  alerts.forEach(a => a.isNew = false);

  container.innerHTML = `
    <div class="page-header">
      <div>
        <h2>ALERTS & NOTIFICATIONS</h2>
        <p>${alerts.length} total alert${alerts.length !== 1 ? 's' : ''} on record</p>
      </div>
      <button onclick="alerts=[];renderAlertsPage(document.getElementById('appMain'))" style="
        background:rgba(255,23,68,0.1);border:1px solid rgba(255,23,68,0.3);
        color:var(--accent-red);padding:8px 16px;border-radius:8px;cursor:pointer;
        font-family:var(--font-body);font-size:12px">
        🗑 Clear All
      </button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px">
      <div class="stat-card" style="--accent-color:var(--accent-red)">
        <div class="stat-label">Emergencies</div>
        <div class="stat-value">${alerts.filter(a=>a.type==='emergency').length}</div>
        <div class="stat-icon">🆘</div>
      </div>
      <div class="stat-card" style="--accent-color:var(--accent-amber)">
        <div class="stat-label">Warnings</div>
        <div class="stat-value">${alerts.filter(a=>a.type==='risk').length}</div>
        <div class="stat-icon">⚠️</div>
      </div>
      <div class="stat-card" style="--accent-color:var(--accent-cyan)">
        <div class="stat-label">Info</div>
        <div class="stat-value">${alerts.filter(a=>a.type==='info').length}</div>
        <div class="stat-icon">📡</div>
      </div>
    </div>

    <div class="glass-card">
      <div class="card-title"><div class="dot"></div> ALL ALERTS</div>
      <div class="alert-list">
        ${alerts.length === 0
          ? '<div style="text-align:center;padding:40px;color:var(--text-dim)">No alerts recorded</div>'
          : alerts.map(a => `
            <div class="alert-item ${a.type}">
              <span class="alert-icon">${a.icon}</span>
              <div class="alert-body" style="flex:1">
                <div class="alert-title">${a.title}</div>
                <div class="alert-desc">${a.desc}</div>
                <div class="alert-time">${a.time}</div>
              </div>
            </div>
          `).join('')}
      </div>
    </div>
  `;
}

// THEME
// ═══════════════════════════════════════════════════════════════
function toggleTheme() {
  darkTheme = !darkTheme;
  document.documentElement.setAttribute('data-theme', darkTheme ? 'dark' : 'light');
  document.body.style.background = darkTheme ? '' : 'var(--ocean-deep)';
  document.querySelector('.theme-toggle').textContent = darkTheme ? '🌙' : '☀️';
}
